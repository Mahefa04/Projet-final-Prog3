openapi: 3.0.3
info:
  title: Agricultural Federation API
  version: 1.0.0
  description: API REST for collectivity management

servers:
  - url: http://localhost:8000

paths:
  /collectivities:
    post:
      summary: Create a new collectivity
      tags:
        - Collectivities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectivityRequest'
      responses:
        '201':
          description: Collectivity created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivity'
        '400':
          description: Conditions not satisfied

  /members:
    post:
      summary: Add new member
      tags:
        - Members
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddNewMemberRequest'
      responses:
        '201':
          description: Member added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Member'
        '400':
          description: Conditions not satisfied

  /reports/collectivities:
    get:
      summary: Get collectivity statistics report for a given period
      tags:
        - Reports
      parameters:
        - name: startDate
          in: query
          required: true
          description: Start date of the reporting period
          schema:
            type: string
            format: date
            example: 2026-01-01
        - name: endDate
          in: query
          required: true
          description: End date of the reporting period
          schema:
            type: string
            format: date
            example: 2026-12-31
      responses:
        '200':
          description: Collectivity statistics report generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectivityReportListResponse'
        '400':
          description: Invalid period parameters

components:
  schemas:
    Collectivity:
      type: object
      properties:
        number:
          type: string
          description: Unique collectivity number
          example: COL-001
        name:
          type: string
          description: Unique collectivity name
          example: Collectif Analamanga
        city:
          type: string
          example: Antananarivo
        specialization:
          type: string
          example: Riziculture
        creationDate:
          type: string
          format: date
          example: 2020-08-16
      required:
        - number
        - name
        - city
        - specialization
        - creationDate

    CreateCollectivityRequest:
      type: object
      properties:
        number:
          type: string
          description: Unique collectivity number
          example: COL-001
        name:
          type: string
          description: Unique collectivity name
          example: Collectif Analamanga
        city:
          type: string
          example: Antananarivo
        specialization:
          type: string
          example: Riziculture
        membersCount:
          type: integer
          minimum: 10
          example: 12
        hasAuthorization:
          type: boolean
          example: true
        posts:
          type: array
          items:
            type: string
          example:
            - president
            - vice_president
            - treasurer
            - secretary
      required:
        - number
        - name
        - city
        - specialization
        - membersCount
        - hasAuthorization
        - posts

    Member:
      type: object
      properties:
        name:
          type: string
          description: Member name
          example: Rakoto
        foreName:
          type: string
          description: Member forename
          example: Jean
        dateOfBirth:
          type: string
          format: date
          example: 1998-06-23
        gender:
          type: string
          example: masculin
        address:
          type: string
          example: Lot II 150 bis G Analakely
        profession:
          type: string
          example: Producer
        phoneNumber:
          type: string
          example: "0321853269"
        emailAddress:
          type: string
          example: rakotoJean@mail.com
        joiningDate:
          type: string
          format: date
          example: 2023-10-29
        specificPost:
          type: string
          example: junior member
      required:
        - name
        - foreName
        - dateOfBirth
        - gender
        - address
        - profession
        - phoneNumber
        - emailAddress
        - joiningDate
        - specificPost

    SponsorRequest:
      type: object
      properties:
        memberId:
          type: integer
          description: Confirmed member acting as sponsor
          example: 12
        relationshipType:
          type: string
          description: Nature of the relationship with the sponsor
          example: family
      required:
        - memberId
        - relationshipType

    AddNewMemberRequest:
      type: object
      description: |
        Request used to register a new member in a collectivity.

        Admission rules:
        - at least two sponsors are required
        - each sponsor must be a confirmed member
        - the number of sponsors from the target collectivity must be greater than or equal to the number of sponsors from other collectivities
        - each sponsor must include the relationship type with the candidate
      properties:
        name:
          type: string
          description: Member name
          example: Rakoto
        foreName:
          type: string
          description: Member forename
          example: Jean
        dateOfBirth:
          type: string
          format: date
          example: 1998-06-23
        gender:
          type: string
          example: masculin
        address:
          type: string
          example: Lot II 150 bis G Analakely
        profession:
          type: string
          example: Producer
        phoneNumber:
          type: string
          example: "0321853269"
        emailAddress:
          type: string
          example: rakotoJean@mail.com
        sponsors:
          type: array
          minItems: 2
          description: List of sponsors for the candidate
          items:
            $ref: '#/components/schemas/SponsorRequest'
      required:
        - name
        - foreName
        - dateOfBirth
        - gender
        - address
        - profession
        - phoneNumber
        - emailAddress
        - sponsors

    CollectivityReport:
      type: object
      properties:
        collectivityNumber:
          type: string
          description: Unique collectivity number
          example: COL-001
        collectivityName:
          type: string
          description: Collectivity name
          example: Collectif Analamanga
        periodStart:
          type: string
          format: date
          example: 2026-01-01
        periodEnd:
          type: string
          format: date
          example: 2026-12-31
        attendanceRate:
          type: number
          format: double
          description: Global attendance rate of the collectivity over the given period, expressed as a percentage
          example: 87.5
        upToDateContributionRate:
          type: number
          format: double
          description: Percentage of members in the collectivity who are up to date with their contributions over the given period
          example: 76.4
        newMembersCount:
          type: integer
          description: Number of new members registered in the collectivity over the given period
          example: 14
      required:
        - collectivityNumber
        - collectivityName
        - periodStart
        - periodEnd
        - attendanceRate
        - upToDateContributionRate
        - newMembersCount

    CollectivityReportListResponse:
      type: object
      properties:
        startDate:
          type: string
          format: date
          example: 2026-01-01
        endDate:
          type: string
          format: date
          example: 2026-12-31
        reports:
          type: array
          items:
            $ref: '#/components/schemas/CollectivityReport'
      required:
        - startDate
        - endDate
        - reports